<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TV Online IPTV Lite</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Arial;text-align:center}
header{padding:15px;background:#111;font-size:20px;font-weight:bold}
video{width:95%;max-width:900px;margin-top:15px;background:#000;border-radius:10px;aspect-ratio:16/9}
select{margin-top:15px;padding:12px;width:90%;max-width:420px;font-size:16px;background:#222;color:#fff;border:1px solid #444;border-radius:8px}
button{margin:8px 4px;padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
.btn-del{background:#ff3b3b;color:#fff}.btn-reset{background:#333;color:#fff}
.status{margin-top:10px;color:#00ff99;min-height:20px}
</style>
</head>
<body>
<header>📡 MI CANAL - Todos los links juntos</header>
<select id="channels"></select>
<div>
  <button class="btn-del" id="btnDel">❌ Quitar</button>
  <button class="btn-reset" id="btnReset">🔄 Restaurar</button>
</div>
<video id="video" controls autoplay muted playsinline></video>
<div class="status" id="status"></div>

<script>
const DEFAULT_CHANNELS = [
  {name:"🧪 1- Mux Test", url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"},
  {name:"🧪 2- Apple BipBop", url:"https://devstreaming-cdn.apple.com/videos/streaming/examples/bipbop_4x3/bipbop_4x3_variant.m3u8"},
  {name:"🧪 3- Apple Adv", url:"https://devstreaming-cdn.apple.com/videos/streaming/examples/img_bipbop_adv_example_fmp4/master.m3u8"},
  {name:"🇫🇷 France 24 ES", url:"https://static.france24.com/live/F24_ES_LO_HLS/live_web.m3u8"},
  {name:"🌍 Euronews ES", url:"https://rakuten-euronews-2-es.samsung.wurl.tv/playlist.m3u8"},
  {name:"🇺🇸 NASA TV", url:"https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV1-HLS/master.m3u8"},
  {name:"🇩🇪 DW Español", url:"https://dwamdstream102.akamaized.net/hls/live/2015530/dwstream102/index.m3u8"}
];

let channels = JSON.parse(localStorage.getItem('iptv_all')) || [...DEFAULT_CHANNELS];
const sel = document.getElementById('channels'), video = document.getElementById('video'), status = document.getElementById('status');
let hls, idx=0;

function save(){localStorage.setItem('iptv_all',JSON.stringify(channels))}
function load(){
  sel.innerHTML=""; channels.forEach((c,i)=>{let o=document.createElement('option');o.value=i;o.text=c.name;sel.add(o)});
  if(channels.length) play(0); else status.textContent="Sin canales";
}
function play(i){
  idx=i; sel.value=i; const {name,url}=channels[i]; status.textContent="Cargando: "+name;
  if(hls)hls.destroy();
  if(Hls.isSupported()){hls=new Hls();hls.loadSource(url);hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{video.play();status.textContent="En vivo: "+name});
    hls.on(Hls.Events.ERROR,(e,d)=>{if(d.fatal){status.textContent="❌ Caído, borrando...";del(i,true)}});
  }else{video.src=url;video.play()}
}
function del(i,auto){channels.splice(i,1);save();load();if(!auto)status.textContent="Eliminado";}

document.getElementById('btnDel').onclick=()=>del(idx);
document.getElementById('btnReset').onclick=()=>{localStorage.removeItem('iptv_all');channels=[...DEFAULT_CHANNELS];load()};
sel.onchange=e=>play(e.target.value);
load();
</script>
</body>
</html>
