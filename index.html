<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mi Canal - TV y Películas</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Arial;text-align:center}
header{padding:12px;background:#111;font-size:18px;font-weight:bold}
.topbtns{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:10px}
.topbtns button{background:#1e90ff;color:#fff;border:none;padding:10px 14px;border-radius:8px;font-weight:bold;cursor:pointer}
select{margin:6px;padding:10px;width:44%;max-width:220px;background:#222;color:#fff;border:1px solid #444;border-radius:8px}
video{width:95%;max-width:900px;margin-top:12px;background:#000;border-radius:10px;aspect-ratio:16/9}
.controls button{margin:8px 4px;padding:9px 13px;border:none;border-radius:8px;cursor:pointer}
.btn-del{background:#ff3b3b;color:#fff}.btn-reset{background:#333;color:#fff}
.status{margin-top:8px;color:#00ff99;min-height:20px;font-size:14px}
</style>
</head>
<body>
<header>📡 MI CANAL</header>

<div class="topbtns">
  <button onclick="window.open('https://www.youtube.com/todonoticias/live','_blank')">TN</button>
  <button onclick="window.open('https://www.youtube.com/@lanacionmas/live','_blank')">LN+</button>
  <button onclick="window.open('https://www.youtube.com/@AmericaTV/live','_blank')">América</button>
  <button onclick="window.open('https://mitelefe.com/vivo','_blank')">Telefe</button>
</div>

<div>
  <select id="cat">
    <option value="ar">Canales Argentina</option>
    <option value="accion">Películas Acción</option>
    <option value="policial">Policial / Crimen</option>
    <option value="drama">Drama</option>
    <option value="comedia">Comedia</option>
    <option value="musica">Música</option>
  </select>
  <select id="channels"><option>Cargando...</option></select>
</div>

<div class="controls">
  <button class="btn-del" id="btnDel">❌ Quitar</button>
  <button class="btn-reset" id="btnReset">🔄 Recargar</button>
</div>

<video id="video" controls autoplay muted playsinline></video>
<div class="status" id="status"></div>

<script>
const LISTAS = {
  ar: "https://iptv-org.github.io/iptv/countries/ar.m3u",
  accion: "https://iptv-org.github.io/iptv/categories/action.m3u",
  policial: "https://iptv-org.github.io/iptv/categories/action.m3u",
  drama: "https://iptv-org.github.io/iptv/categories/drama.m3u",
  comedia: "https://iptv-org.github.io/iptv/categories/comedy.m3u",
  musica: "https://iptv-org.github.io/iptv/categories/music.m3u"
};

const catSel = document.getElementById('cat');
const sel = document.getElementById('channels');
const video = document.getElementById('video');
const status = document.getElementById('status');
let channels=[], hls, idx=0;

async function cargar(){
  const url = LISTAS[catSel.value];
  status.textContent = "Descargando lista...";
  const txt = await fetch(url).then(r=>r.text());
  channels = [];
  const lines = txt.split('\n');
  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith('#EXTINF')){
      const name = lines[i].split(',').pop().trim();
      const link = lines[i+1]?.trim();
      if(link && link.includes('m3u8')) channels.push({name,url:link});
    }
    if(channels.length>=100) break;
  }
  sel.innerHTML=""; channels.forEach((c,i)=>{let o=document.createElement('option');o.value=i;o.text=c.name;sel.add(o)});
  status.textContent = `${channels.length} canales cargados`;
  if(channels.length) play(0);
}

function play(i){
  if(!channels[i]) return;
  idx=i; sel.value=i;
  const {name,url}=channels[i];
  status.textContent = "Probando: "+name;
  if(hls) hls.destroy();
  if(Hls.isSupported()){
    hls=new Hls(); hls.loadSource(url); hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{video.play().catch(()=>{}); status.textContent="En vivo: "+name});
    hls.on(Hls.Events.ERROR,(e,d)=>{if(d.fatal){ channels[i].name+=' (OFF)'; sel.options[i].text=channels[i].name; setTimeout(()=>play((i+1)%channels.length),800); }});
  }else{ video.src=url; video.play(); }
}

catSel.onchange = cargar;
sel.onchange = e=>play(e.target.value);
document.getElementById('btnDel').onclick = ()=>{ channels.splice(idx,1); sel.remove(idx); play(idx%channels.length); };
document.getElementById('btnReset').onclick = cargar;

cargar();
</script>
</body>
</html>
