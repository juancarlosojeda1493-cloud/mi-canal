<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mi Canal - 100 Canales Públicos</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Arial;text-align:center}
header{padding:15px;background:#111;font-size:18px;font-weight:bold}
video{width:95%;max-width:900px;margin-top:12px;background:#000;border-radius:10px;aspect-ratio:16/9}
select{margin-top:12px;padding:12px;width:92%;max-width:500px;background:#222;color:#fff;border:1px solid #444;border-radius:8px}
button{margin:8px 4px;padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
.btn-del{background:#ff3b3b;color:#fff}.btn-reset{background:#333;color:#fff}
.status{margin-top:10px;color:#00ff99;min-height:20px;font-size:14px}
</style>
</head>
<body>
<header>📡 MI CANAL - 100 canales libres (auto-filtra)</header>
<select id="channels"><option>Cargando lista...</option></select>
<div>
  <button class="btn-del" id="btnDel">❌ Quitar canal</button>
  <button class="btn-reset" id="btnReset">🔄 Recargar lista</button>
</div>
<video id="video" controls autoplay muted playsinline></video>
<div class="status" id="status">Iniciando...</div>

<script>
// Cambia "ar.m3u" por "es.m3u", "mx.m3u", "us.m3u" o "index.m3u" si quieres otro país o mundial
const LISTA_URL = "https://iptv-org.github.io/iptv/countries/ar.m3u";

const sel = document.getElementById('channels');
const video = document.getElementById('video');
const status = document.getElementById('status');
let channels = [], hls, idx = 0;

async function cargar(){
  status.textContent = "Descargando lista pública...";
  const txt = await fetch(LISTA_URL).then(r=>r.text());
  const lines = txt.split('\n');
  channels = [];
  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith('#EXTINF')){
      const name = lines[i].split(',').pop().trim();
      const url = lines[i+1]?.trim();
      if(url && url.includes('.m3u8')) channels.push({name, url});
    }
    if(channels.length >= 100) break; // limitamos a 100
  }
  sel.innerHTML = "";
  channels.forEach((c,i)=>{ const o=document.createElement('option'); o.value=i; o.text=c.name; sel.add(o); });
  status.textContent = `Lista cargada: ${channels.length} canales. Probando...`;
  if(channels.length) play(0);
}

function play(i){
  if(!channels[i]) return;
  idx = i; sel.value = i;
  const {name,url} = channels[i];
  status.textContent = "Probando: " + name;
  if(hls) hls.destroy();
  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ video.play().catch(()=>{}); status.textContent = "En vivo: " + name; });
    hls.on(Hls.Events.ERROR, (e,d)=>{
      if(d.fatal){
        // Marcamos como OFF pero no rompemos la lista
        if(!channels[i].name.includes('(OFF)')) channels[i].name += " (OFF)";
        sel.options[i].text = channels[i].name;
        status.textContent = "❌ Bloqueado (CORS), saltando...";
        setTimeout(()=> play((i+1)%channels.length), 1000);
      }
    });
  }else{
    video.src = url; video.play();
  }
}

sel.onchange = e => play(e.target.value);
document.getElementById('btnDel').onclick = ()=>{ channels.splice(idx,1); sel.remove(idx); if(channels[idx]) play(idx); };
document.getElementById('btnReset').onclick = cargar;

cargar();
</script>
</body>
</html>
