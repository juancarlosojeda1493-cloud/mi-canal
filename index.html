<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Mi Canal en Vivo</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:system-ui,Arial; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    h1 { font-size:2rem; margin-bottom:20px; text-align:center; }
    #video { width:100%; max-width:800px; background:#000; border-radius:12px; }
    .btn { display:inline-block; margin-top:20px; padding:15px 30px; background:#1e90ff; color:#fff; text-decoration:none; font-size:1.1rem; border-radius:10px; font-weight:bold; }
    .btn:active { opacity:0.8; }
  </style>
</head>
<body>
  <h1>Mi Canal en Vivo</h1>
  
  <video id="video" controls autoplay playsinline></video>
  
  <a id="btn-directo" href="#" target="_blank" class="btn">Entrar directo al stream</a>

  <script>
    // ==== CAMBIA SOLO ESTA LINEA ====
    const STREAM_URL = "https://PON-AQUI-TU-LINK.m3u8";
    // ================================

    const video = document.getElementById('video');
    const btn = document.getElementById('btn-directo');
    btn.href = STREAM_URL;

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(STREAM_URL);
      hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = STREAM_URL;
    }
  </script>
</body>
</html>
