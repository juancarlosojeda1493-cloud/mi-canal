<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Online IPTV Lite</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
}

header {
    padding:15px;
    background:#111;
    font-size:20px;
    font-weight:bold;
}

.container {
    display:flex;
    flex-direction:column;
    align-items:center;
}

video {
    width:95%;
    max-width:900px;
    margin-top:15px;
    background:black;
    border-radius:10px;
}

select {
    margin-top:15px;
    padding:10px;
    width:90%;
    max-width:400px;
    font-size:16px;
}

.status {
    margin-top:10px;
    font-size:14px;
    color:#00ff99;
}
</style>
</head>

<body>

<header>📡 IPTV LIVE - Canal Multipaís</header>

<div class="container">

<select id="channels"></select>

<video id="video" controls autoplay></video>

<div class="status" id="status">Listo para reproducir</div>

</div>

<script>
// ==========================
// LISTA DE CANALES (.m3u8)
// ==========================
const channels = [
  {
    name: "🇦🇷 TV Pública Argentina",
    url: "https://live-edge01.telecentro.net.ar/live/smil:tvpublica.smil/playlist.m3u8"
  },
  {
    name: "🇧🇷 TV Brasil",
    url: "https://tvbrasil.ebc.com.br/live.m3u8"
  },
  {
    name: "🇫🇷 France 24",
    url: "https://static.france24.com/live/F24_EN_LO_HLS/live_web.m3u8"
  },
  {
    name: "🇪🇸 RTVE 24h",
    url: "https://rtvelivestream.akamaized.net/rtvesec/la1/la1_main.m3u8"
  },
  {
    name: "🌍 Euronews",
    url: "https://rakuten-euronews-2-es.samsung.wurl.tv/playlist.m3u8"
  }
];

const select = document.getElementById("channels");
const video = document.getElementById("video");
const status = document.getElementById("status");

let hls;

// ==========================
// CARGAR LISTA
// ==========================
channels.forEach((c, i) => {
    let opt = document.createElement("option");
    opt.value = i;
    opt.text = c.name;
    select.appendChild(opt);
});

// ==========================
// REPRODUCIR CANAL
// ==========================
function playChannel(index) {

    const url = channels[index].url;
    status.innerText = "Cargando: " + channels[index].name;

    if (hls) {
        hls.destroy();
    }

    if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video.play();
            status.innerText = "En vivo: " + channels[index].name;
        });

        hls.on(Hls.Events.ERROR, function () {
            status.innerText = "❌ Canal caído, cambiando...";
            disableChannel(index);
        });

    } else {
        video.src = url;
        video.play();
    }
}

// ==========================
// DESHABILITAR CANAL CAÍDO
// ==========================
function disableChannel(index) {
    channels[index].url = "";
    select.options[index].text += " (OFF)";
}

// ==========================
// EVENTO CAMBIO
// ==========================
select.addEventListener("change", function () {
    playChannel(this.value);
});

// ==========================
// INICIO
// ==========================
playChannel(0);

</script>

</body>
</html>
